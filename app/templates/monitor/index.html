{% extends "base.html" %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center bg-dark text-light">
                    <h5 class="mb-0">Application Logs</h5>
                    <div>
                        <button class="btn btn-sm btn-outline-light" onclick="clearLogs()">Clear</button>
                        <button class="btn btn-sm btn-outline-light" onclick="toggleAutoScroll()" id="autoScrollBtn">Auto-scroll: ON</button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="log-container" class="bg-dark text-light p-3" style="height: 600px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 14px;">
                        <div id="log-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let autoScroll = true;
const logContent = document.getElementById('log-content');
const logContainer = document.getElementById('log-container');
const autoScrollBtn = document.getElementById('autoScrollBtn');

function toggleAutoScroll() {
    autoScroll = !autoScroll;
    autoScrollBtn.textContent = `Auto-scroll: ${autoScroll ? 'ON' : 'OFF'}`;
}

function clearLogs() {
    logContent.innerHTML = '';
}

function scrollToBottom() {
    if (autoScroll) {
        logContainer.scrollTop = logContainer.scrollHeight;
    }
}

function getLogLevelClass(level) {
    switch (level.toUpperCase()) {
        case 'ERROR':
            return 'text-danger';
        case 'WARNING':
            return 'text-warning';
        case 'INFO':
            return 'text-info';
        case 'DEBUG':
            return 'text-secondary';
        default:
            return 'text-light';
    }
}

function formatLogEntry(entry) {
    try {
        const data = typeof entry === 'string' ? JSON.parse(entry) : entry;
        
        if (data.type === 'heartbeat') {
            return;  // Don't display heartbeats
        }

        const logLine = document.createElement('div');
        logLine.className = 'log-line';
        
        // Add timestamp
        const timestamp = document.createElement('span');
        timestamp.className = 'text-muted';
        timestamp.textContent = `[${data.timestamp}] `;
        logLine.appendChild(timestamp);
        
        // Add message with appropriate color based on level
        const message = document.createElement('span');
        message.className = getLogLevelClass(data.level);
        
        // Format message based on type
        if (data.type === 'request') {
            message.className += ' text-success'; // Make requests green
        }
        
        message.textContent = data.message;
        logLine.appendChild(message);
        
        return logLine;
    } catch (error) {
        console.error('Error formatting log entry:', error);
        return null;
    }
}

// Connect to SSE endpoint
const eventSource = new EventSource("{{ url_for('monitor.stream') }}");

eventSource.onmessage = function(event) {
    const logLine = formatLogEntry(event.data);
    if (logLine) {
        logContent.appendChild(logLine);
        scrollToBottom();
        
        // Keep only last 1000 lines to prevent memory issues
        while (logContent.children.length > 1000) {
            logContent.removeChild(logContent.firstChild);
        }
    }
};

eventSource.onerror = function(error) {
    console.error('EventSource failed:', error);
    const errorLine = document.createElement('div');
    errorLine.className = 'text-danger';
    errorLine.textContent = 'Connection lost. Trying to reconnect...';
    logContent.appendChild(errorLine);
    scrollToBottom();
};
</script>

<style>
.log-line {
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.4;
    margin-bottom: 2px;
}

/* Custom scrollbar for Webkit browsers */
#log-container::-webkit-scrollbar {
    width: 12px;
}

#log-container::-webkit-scrollbar-track {
    background: #343a40;
}

#log-container::-webkit-scrollbar-thumb {
    background-color: #6c757d;
    border-radius: 6px;
    border: 3px solid #343a40;
}

/* For Firefox */
#log-container {
    scrollbar-width: thin;
    scrollbar-color: #6c757d #343a40;
}
</style>
{% endblock %}
