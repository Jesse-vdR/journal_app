{% extends "base.html" %}

{% block title %}File Browser{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-3">
        <div class="col">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb" id="path-breadcrumb">
                    <li class="breadcrumb-item"><a href="#" data-path="/">Root</a></li>
                </ol>
            </nav>
        </div>
    </div>
    
    <div class="row mb-3">
        <div class="col">
            <form id="upload-form" class="d-inline">
                <input type="file" id="file-input" class="d-none" multiple>
                <button type="button" class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                    <i class="bi bi-upload"></i> Upload Files
                </button>
            </form>
        </div>
    </div>
    
    <div class="row">
        <div class="col">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Size</th>
                            <th>Modified</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="file-list">
                        <!-- Files will be loaded here dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Loading spinner -->
<div id="loading-spinner" class="text-center d-none">
    <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<!-- Upload progress modal -->
<div class="modal fade" id="upload-progress-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Uploading Files</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="progress">
                    <div id="upload-progress-bar" class="progress-bar" role="progressbar"></div>
                </div>
                <div id="upload-status" class="mt-2"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    let currentPath = '/';
    const uploadModal = new bootstrap.Modal(document.getElementById('upload-progress-modal'));
    const uploadStatus = document.getElementById('upload-status');
    
    function formatDate(timestamp) {
        return new Date(timestamp * 1000).toLocaleString();
    }
    
    function formatSize(size) {
        if (!size) return '';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        let i = 0;
        let filesize = parseInt(size);
        while (filesize >= 1024 && i < units.length - 1) {
            filesize /= 1024;
            i++;
        }
        return `${filesize.toFixed(1)} ${units[i]}`;
    }
    
    function updateBreadcrumb(path) {
        const parts = path.split('/').filter(Boolean);
        const breadcrumb = document.getElementById('path-breadcrumb');
        breadcrumb.innerHTML = '<li class="breadcrumb-item"><a href="#" data-path="/">Root</a></li>';
        
        let currentPath = '';
        parts.forEach((part, index) => {
            currentPath += '/' + part;
            const li = document.createElement('li');
            li.className = 'breadcrumb-item';
            if (index === parts.length - 1) {
                li.classList.add('active');
                li.textContent = part;
            } else {
                const a = document.createElement('a');
                a.href = '#';
                a.dataset.path = currentPath;
                a.textContent = part;
                li.appendChild(a);
            }
            breadcrumb.appendChild(li);
        });
    }
    
    function loadFiles(path = '/') {
        const spinner = document.getElementById('loading-spinner');
        const fileList = document.getElementById('file-list');
        
        spinner.classList.remove('d-none');
        fileList.innerHTML = '';
        
        fetch(`/files/api/files?path=${encodeURIComponent(path)}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                currentPath = data.current_path;
                updateBreadcrumb(currentPath);
                
                // Add parent directory link if available
                if (data.parent_path) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><a href="#" data-path="${data.parent_path}">..</a></td>
                        <td>Directory</td>
                        <td></td>
                        <td></td>
                        <td></td>
                    `;
                    fileList.appendChild(row);
                }
                
                // Add files and directories
                data.items.forEach(item => {
                    const row = document.createElement('tr');
                    const downloadButton = item.type === 'file' 
                        ? `<button class="btn btn-sm btn-outline-primary" onclick="window.downloadFile('${item.path}')">
                             <i class="bi bi-download"></i> Download
                           </button>`
                        : '';
                    
                    row.innerHTML = `
                        <td>
                            ${item.type === 'directory' 
                                ? `<a href="#" data-path="${item.path}">${item.name}/</a>`
                                : item.name}
                        </td>
                        <td>${item.type}</td>
                        <td>${formatSize(item.size)}</td>
                        <td>${formatDate(item.modified)}</td>
                        <td>${downloadButton}</td>
                    `;
                    fileList.appendChild(row);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                fileList.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center text-danger">
                            Error loading files. Please try again.
                        </td>
                    </tr>
                `;
            })
            .finally(() => {
                spinner.classList.add('d-none');
            });
    }
    
    // File upload handling
    const fileInput = document.getElementById('file-input');
    const progressBar = document.getElementById('upload-progress-bar');
    
    fileInput.addEventListener('change', async function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        uploadModal.show();
        progressBar.style.width = '0%';
        progressBar.textContent = '0%';
        uploadStatus.innerHTML = '';
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('path', currentPath);
            
            try {
                const response = await fetch('/files/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'Upload failed');
                }
                
                const progress = ((i + 1) / files.length * 100).toFixed(0);
                progressBar.style.width = `${progress}%`;
                progressBar.textContent = `${progress}%`;
                
                uploadStatus.innerHTML += `<div class="text-success">✓ ${file.name} uploaded successfully</div>`;
            } catch (error) {
                console.error('Upload error:', error);
                uploadStatus.innerHTML += `<div class="text-danger">✗ Failed to upload ${file.name}: ${error.message}</div>`;
            }
        }
        
        // Reload file list and reset file input
        loadFiles(currentPath);
        fileInput.value = '';
    });
    
    // Event delegation for directory navigation
    document.addEventListener('click', function(e) {
        const link = e.target.closest('a[data-path]');
        if (link) {
            e.preventDefault();
            loadFiles(link.dataset.path);
        }
    });
    
    // File download function
    window.downloadFile = function(path) {
        window.location.href = `/files/api/download?path=${encodeURIComponent(path)}`;
    };
    
    // Initial load
    loadFiles('/');
});
</script>
{% endblock %}
