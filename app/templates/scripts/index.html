{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Available Scripts</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        {% for script in scripts %}
                        <div class="col-md-6 mb-4">
                            <div class="card h-100">
                                <div class="card-body">
                                    <h5 class="card-title">{{ script.name }}</h5>
                                    <p class="card-text">{{ script.description }}</p>
                                    <button class="btn btn-primary" onclick="runScript('{{ script.name }}')">
                                        Run Script
                                    </button>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Output Modal -->
    <div class="modal fade" id="outputModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Script Output</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="script-output" class="bg-dark text-light p-3" style="min-height: 200px; font-family: 'Consolas', monospace;">
                        <div id="output-content"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let outputModal;
let currentQueueId = null;
let outputCheckInterval = null;

document.addEventListener('DOMContentLoaded', function() {
    outputModal = new bootstrap.Modal(document.getElementById('outputModal'));
});

function showOutput(message, isError = false) {
    const outputContent = document.getElementById('output-content');
    const line = document.createElement('pre');
    line.className = isError ? 'text-danger mb-0' : 'text-light mb-0';
    line.textContent = message;
    outputContent.appendChild(line);
}

function clearOutput() {
    document.getElementById('output-content').innerHTML = '';
}

function checkOutput() {
    if (!currentQueueId) return;
    
    fetch(`/scripts/output/${currentQueueId}`)
        .then(response => response.json())
        .then(data => {
            if (data.status === 'complete') {
                if (data.output && data.output.trim()) {
                    showOutput(data.output);
                }
                if (!data.success) {
                    showOutput('Script completed with errors', true);
                }
                stopCheckingOutput();
            } else if (data.status === 'error') {
                if (data.output && data.output.trim()) {
                    showOutput(data.output);
                }
                showOutput(`Error: ${data.error}`, true);
                stopCheckingOutput();
            } else if (data.status === 'not_found') {
                showOutput('Script not found or already completed', true);
                stopCheckingOutput();
            }
        })
        .catch(error => {
            showOutput(`Error checking output: ${error}`, true);
            stopCheckingOutput();
        });
}

function stopCheckingOutput() {
    if (outputCheckInterval) {
        clearInterval(outputCheckInterval);
        outputCheckInterval = null;
    }
    currentQueueId = null;
}

function runScript(scriptName) {
    clearOutput();
    outputModal.show();
    showOutput(`Running ${scriptName}...`);
    
    fetch(`/scripts/run/${scriptName}`)
        .then(response => response.json())
        .then(data => {
            currentQueueId = data.queue_id;
            outputCheckInterval = setInterval(checkOutput, 1000);
        })
        .catch(error => {
            showOutput(`Error starting script: ${error}`, true);
        });
}

// Clean up when modal is closed
document.getElementById('outputModal').addEventListener('hidden.bs.modal', function () {
    stopCheckingOutput();
});
</script>

<style>
#script-output {
    border-radius: 4px;
    max-height: 400px;
    overflow-y: auto;
}

/* Custom scrollbar for Webkit browsers */
#script-output::-webkit-scrollbar {
    width: 12px;
}

#script-output::-webkit-scrollbar-track {
    background: #343a40;
}

#script-output::-webkit-scrollbar-thumb {
    background-color: #6c757d;
    border-radius: 6px;
    border: 3px solid #343a40;
}

/* For Firefox */
#script-output {
    scrollbar-width: thin;
    scrollbar-color: #6c757d #343a40;
}
</style>
{% endblock %}
