server {
    listen 80;
    listen [::]:80;
    server_name journal.jesselab.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name journal.jesselab.space;

    ssl_certificate     /etc/letsencrypt/live/jesselab.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jesselab.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Shell assets — alias to apex's deployed shell directory.
    # /srv/web/home/site/shell/ is shipped by personal_web's deploy.
    location ^~ /shell/ {
        alias /srv/web/home/site/shell/;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        location ~* \.(woff2|ttf)$ {
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            try_files $uri =404;
        }
        try_files $uri =404;
    }

    root /srv/web/journal/site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|svg|webp|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    location = /sw.js {
        add_header Cache-Control "no-store";
    }

    location = /manifest.json {
        add_header Cache-Control "public, max-age=300";
    }
}
