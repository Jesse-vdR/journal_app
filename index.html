<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Journal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <section id="view-list" hidden>
      <header class="view-header">
        <h2>Journal</h2>
      </header>
      <ul id="dates-list"></ul>
      <p id="dates-empty" class="muted" hidden>No entries yet — tap Today to start.</p>
      <div class="row">
        <button id="open-today">Today</button>
      </div>
    </section>

    <section id="view-detail" hidden>
      <header class="view-header">
        <button id="detail-back" class="back-btn">‹ Dates</button>
        <h2 id="detail-title">—</h2>
      </header>
      <div id="detail-voice"></div>
      <textarea id="detail-text" placeholder="Type something…" autocomplete="off" spellcheck="true"></textarea>
      <div class="row">
        <button id="detail-save" class="primary">Save</button>
        <button id="rec-btn">● Record</button>
      </div>
      <div id="rec-status" hidden>
        <span class="rec-dot"></span>
        <span id="rec-time">0:00</span>
      </div>
    </section>
  </main>

  <div id="sync-bar">
    <button id="sync-btn">Sync</button>
    <button id="settings-btn" title="Settings">⚙</button>
  </div>

  <div id="settings" hidden>
    <h2>Settings</h2>

    <h3>Signed in as</h3>
    <p id="me-view" class="help">—</p>
    <div class="row">
      <button id="signout-btn" class="danger">Sign out</button>
      <button id="settings-close">Close</button>
    </div>

    <h3>Pending</h3>
    <pre id="pending-view">—</pre>
    <div class="row">
      <button id="pending-clear" class="danger">Discard pending (no sync)</button>
    </div>
  </div>

  <div id="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
